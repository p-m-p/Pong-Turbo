<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Full-bleed black for maskable; design inset ~10% (safe zone) -->
  <rect width="32" height="32" fill="#000"/>
  <!-- Inset group ~3.2px all sides for maskable safe zone -->
  <g transform="translate(1.5,1.5) scale(0.9)">
    <!-- Ghost body (Blinky red) -->
    <path d="M2,10 A9,9,0,0,1,20,10 L20,25 Q17,29 14,25 Q11,29 8,25 Q5,29 2,25 Z" fill="#ff0000"/>
    <!-- Eyes (white) -->
    <circle cx="8"  cy="13" r="2.5" fill="#fff"/>
    <circle cx="14" cy="13" r="2.5" fill="#fff"/>
    <!-- Pupils -->
    <circle cx="9.2"  cy="13.5" r="1.3" fill="#000"/>
    <circle cx="15.2" cy="13.5" r="1.3" fill="#000"/>
    <!-- Pong ball -->
    <rect x="17" y="9" width="7" height="7" fill="#fff"/>
    <!-- Impact lines -->
    <line x1="25" y1="7"  x2="28" y2="5"  stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="26" y1="12" x2="30" y2="12" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="17" x2="28" y2="19" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
