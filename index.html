<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PONG :: Turbo</title>
  <link rel="stylesheet" href="styles/pong.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Play:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">

  <header>
    <h1 id="logo">PONG <span>Turbo</span></h1>
    <div id="hud">
      <div id="score-display">
        <span id="playerscore">0</span>
        <ul id="lives" role="list" aria-label="Lives remaining">
          <li class="life active" aria-label="Life 1"></li>
          <li class="life active" aria-label="Life 2"></li>
          <li class="life active" aria-label="Life 3"></li>
          <li class="life active" aria-label="Life 4"></li>
          <li class="life active" aria-label="Life 5"></li>
        </ul>
      </div>
      <button id="toggleSound" aria-label="Mute sound">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
          <!-- Musical note (Heroicons musical-note-solid) -->
          <path fill-rule="evenodd" d="M19.952 1.651a.75.75 0 01.298.599V16.303a3 3 0 01-2.176 2.884l-1.32.377a2.553 2.553 0 11-1.403-4.909l2.311-.66a1.5 1.5 0 001.088-1.442V6.994l-9 2.572v9.737a3 3 0 01-2.176 2.884l-1.32.377a2.553 2.553 0 11-1.402-4.909l2.31-.66a1.5 1.5 0 001.088-1.442V9.994a.75.75 0 01.544-.721l10.5-3a.75.75 0 01.658.096z" clip-rule="evenodd"/>
          <!-- Mute slash — hidden by default, shown via CSS when .muted -->
          <line class="mute-slash" x1="3" y1="21" x2="21" y2="3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="canvas-wrap">
    <div id="start-screen">
      <button id="startGame">Play</button>
    </div>
    <canvas id="pongBoard">
      <p>Your browser does not support HTML5 Canvas. Please update to a modern browser.</p>
    </canvas>
  </main>

  <footer>
    Brought to you by <a href="https://philparsons.co.uk">Phil Parsons</a> with thanks to
    <a href="http://www.8bitweapon.com/">8 Bit Weapon</a> for the soundtrack.
  </footer>

</div>

<div hidden>
  <audio id="soundtrack" preload="auto" loop>
    <source src="sound/mp3/ChipOnYourShoulder.mp3">
  </audio>
  <div id="gameSounds"></div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
