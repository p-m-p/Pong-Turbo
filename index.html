<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pong Turbo" />
    <title>PONG Turbo</title>
    <meta
      name="description"
      content="Pac-Man meets Space Invaders in this retro arcade pong game. Dodge ghosts, shoot aliens, and destroy the mothership."
    />
    <link rel="canonical" href="https://p-m-p.github.io/Pong-Turbo/" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/Pong-Turbo/icon-192.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <!-- Open Graph / social card -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://p-m-p.github.io/Pong-Turbo/" />
    <meta property="og:title" content="PONG Turbo" />
    <meta
      property="og:description"
      content="Pac-Man meets Space Invaders in this retro pong game."
    />
    <meta property="og:image" content="/Pong-Turbo/social-card.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PONG Turbo" />
    <meta
      name="twitter:description"
      content="Pac-Man meets Space Invaders in this retro pong game."
    />
    <meta name="twitter:image" content="/Pong-Turbo/social-card.svg" />
    <link rel="stylesheet" href="styles/pong.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header>
        <h1 id="logo">
          <img src="./favicon.svg" width="28" height="28" alt="" aria-hidden="true" />
          <span class="logo-title">PONG<span class="logo-sub">Turbo</span></span>
        </h1>
        <pong-hud lives="5"></pong-hud>
        <pong-sound-toggle soundtrack="soundtrack"></pong-sound-toggle>
      </header>

      <main>
        <pong-canvas></pong-canvas>
        <pong-scoreboard hidden api="%VITE_SCOREBOARD_API%"></pong-scoreboard>
      </main>

      <footer>
        Brought to you by <a href="https://philparsons.co.uk">Phil Parsons</a> with thanks to
        <a href="http://www.8bitweapon.com/">8 Bit Weapon</a> for the soundtrack.
      </footer>
    </div>

    <div hidden>
      <audio id="soundtrack" preload="auto" loop>
        <source src="sound/mp3/ChipOnYourShoulder.mp3" />
      </audio>
    </div>

    <div id="rotate-overlay" aria-live="polite" role="status">
      <svg
        class="rotate-icon"
        xmlns="http://www.w3.org/2000/svg"
        width="72"
        height="72"
        viewBox="0 0 72 72"
        fill="none"
        aria-hidden="true"
      >
        <rect x="23" y="3" width="24" height="42" rx="4" stroke="currentColor" stroke-width="2.5" />
        <line
          x1="31"
          y1="8"
          x2="39"
          y2="8"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <line
          x1="31"
          y1="40"
          x2="39"
          y2="40"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
        <path
          d="M10 52 Q10 68 35 68 Q60 68 66 52"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          fill="none"
        />
        <path
          d="M60 46 L66 52 L72 46"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
        />
      </svg>
      <p>Rotate to landscape to play</p>
    </div>

    <script type="module" src="src/main.js"></script>
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "86e36e0634bb461e84a1b6a61f287b46"}'
    ></script>
  </body>
</html>
