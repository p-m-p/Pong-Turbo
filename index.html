<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PONG :: Turbo</title>
  <link rel="stylesheet" href="styles/pong.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Play:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">

  <header>
    <h1 id="logo">PONG <span>Turbo</span></h1>
    <div id="hud">
      <div id="score-display">
        <span id="playerscore">0</span>
        <ul id="lives" role="list" aria-label="Lives remaining">
          <li class="life active" aria-label="Life 1"></li>
          <li class="life active" aria-label="Life 2"></li>
          <li class="life active" aria-label="Life 3"></li>
          <li class="life active" aria-label="Life 4"></li>
          <li class="life active" aria-label="Life 5"></li>
        </ul>
      </div>
      <button id="toggleSound" aria-label="Toggle sound"></button>
    </div>
  </header>

  <main id="canvas-wrap">
    <div id="start-screen">
      <button id="startGame">Play</button>
    </div>
    <canvas id="pongBoard">
      <p>Your browser does not support HTML5 Canvas. Please update to a modern browser.</p>
    </canvas>
  </main>

  <footer>
    Brought to you by <a href="https://philparsons.co.uk">Phil Parsons</a> with thanks to
    <a href="http://www.8bitweapon.com/">8 Bit Weapon</a> for the soundtrack.
  </footer>

</div>

<div hidden>
  <audio id="soundtrack" preload="auto" loop>
    <source src="sound/mp3/ChipOnYourShoulder.mp3">
  </audio>
  <div id="gameSounds"></div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
