<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PONG :: Turbo</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles/pong.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Play:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">

  <header>
    <h1 id="logo">PONG <span>Turbo</span></h1>
    <pong-hud lives="5"></pong-hud>
    <pong-sound-toggle soundtrack="soundtrack"></pong-sound-toggle>
  </header>

  <pong-canvas></pong-canvas>
  <pong-scoreboard hidden api="http://localhost:8787"></pong-scoreboard>

  <footer>
    Brought to you by <a href="https://philparsons.co.uk">Phil Parsons</a> with thanks to
    <a href="http://www.8bitweapon.com/">8 Bit Weapon</a> for the soundtrack.
  </footer>

</div>

<div hidden>
  <audio id="soundtrack" preload="auto" loop>
    <source src="sound/mp3/ChipOnYourShoulder.mp3">
  </audio>
  <div id="gameSounds"></div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
